name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Needed so manual runs can checkout the requested tag.
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Ensure release tag points at default branch history
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-main}"
          git fetch origin "refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git merge-base --is-ancestor HEAD "origin/${DEFAULT_BRANCH}"; then
            echo "::error::Tagged commit $(git rev-parse --short HEAD) is not on origin/${DEFAULT_BRANCH}."
            echo "Tag only after merging to ${DEFAULT_BRANCH} (see docs/RELEASE.md)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Generate checksums
        run: shasum -a 256 dist/* > dist/SHA256SUMS

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag matches pyproject version
        run: |
          PYPROJECT_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )"
          EXPECTED_TAG="v${PYPROJECT_VERSION}"
          ACTUAL_TAG="${{ steps.tag.outputs.value }}"

          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch."
            echo "pyproject.toml version: ${PYPROJECT_VERSION}"
            echo "Expected tag: ${EXPECTED_TAG}"
            echo "Actual tag: ${ACTUAL_TAG}"
            exit 1
          fi

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*
